<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Python 期末复习</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg: #f2f2f7; --surface: rgba(255,255,255,0.85); --surface2:#fff;
    --text:#1c1c1e; --text2:#3a3a3c; --text3:#8e8e93;
    --border:rgba(60,60,67,0.08); --radius:14px; --radius-sm:10px;
    --blue:#007aff; --green:#34c759; --orange:#ff9500; --red:#ff3b30; --purple:#af52de;
    --safe-bottom:env(safe-area-inset-bottom,16px);
  }
  body {
    font-family:'Inter',-apple-system,sans-serif;
    background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased;
    padding:0 0 calc(90px + var(--safe-bottom));
  }
  .status-bar {
    background:var(--surface); backdrop-filter:blur(40px) saturate(150%);
    -webkit-backdrop-filter:blur(40px) saturate(150%);
    border-bottom:0.5px solid var(--border);
    padding:14px 20px 10px; position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
  }
  .status-bar h1 { font-size:20px; font-weight:700; background:linear-gradient(135deg,#007aff,#5856d6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .status-bar .badge { background:var(--blue); color:#fff; font-size:11px; font-weight:600; padding:3px 12px; border-radius:20px; }
  .hero { padding:16px 20px 8px; }
  .hero h2 { font-size:30px; font-weight:800; letter-spacing:-0.5px; line-height:1.2; }
  .hero h2 span { color:var(--blue); }
  .hero p { font-size:14px; color:var(--text3); margin-top:2px; }

  /* Score Dashboard */
  .dash { padding:0 20px 12px; display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .dash-card {
    background:var(--surface); backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-radius:var(--radius); padding:14px 16px;
    border:0.5px solid var(--border); box-shadow:0 2px 12px rgba(0,0,0,0.04);
    text-align:center;
  }
  .dash-card .num { font-size:28px; font-weight:800; line-height:1.2; }
  .dash-card .label { font-size:11px; color:var(--text3); font-weight:500; margin-top:2px; }
  .dash-card.blue .num { color:var(--blue); }
  .dash-card.green .num { color:var(--green); }
  .dash-card.orange .num { color:var(--orange); }
  .dash-card.red .num { color:var(--red); }

  /* Countdown */
  .cd-row { display:flex; gap:6px; padding:0 20px 12px; }
  .cd-item { flex:1; background:var(--surface); backdrop-filter:blur(20px); border-radius:10px; padding:8px 0; text-align:center; border:0.5px solid var(--border); }
  .cd-num { font-size:20px; font-weight:800; color:var(--blue); line-height:1.2; }
  .cd-label { font-size:10px; font-weight:500; color:var(--text3); }

  /* Progress */
  .prog-wrap { padding:0 20px 6px; }
  .prog-hdr { display:flex; justify-content:space-between; font-size:12px; color:var(--text3); margin-bottom:4px; font-weight:500; }
  .prog-track { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
  .prog-fill { height:100%; background:linear-gradient(90deg,var(--blue),var(--green)); border-radius:3px; transition:width .6s cubic-bezier(.4,0,.2,1); width:0%; }

  /* Day Picker */
  .day-bar { padding:0 20px 4px; position:sticky; top:52px; z-index:90; background:var(--bg); }
  .day-scroll { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding:2px 0; }
  .day-scroll::-webkit-scrollbar { display:none; }
  .day-c {
    flex-shrink:0; padding:7px 14px; border-radius:18px;
    background:var(--surface); border:0.5px solid var(--border);
    cursor:pointer; font-size:12px; font-weight:500; color:var(--text3);
    transition:all .2s; white-space:nowrap; user-select:none;
  }
  .day-c.active { background:var(--blue); color:#fff; border-color:var(--blue); box-shadow:0 4px 12px rgba(0,122,255,.3); }
  .day-c.today::after { content:' 今天'; font-weight:400; opacity:.7; }
  .day-c .q-count { font-size:10px; opacity:.6; }

  /* Content */
  .content { padding:0 16px; }
  .day-sec { display:none; }
  .day-sec.active { display:block; animation:fade .35s cubic-bezier(.4,0,.2,1); }
  @keyframes fade { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

  /* Topic Tags */
  .topic-strip { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:10px; }
  .topic-tag { font-size:11px; padding:4px 10px; border-radius:8px; background:var(--bg); color:var(--text3); border:0.5px solid var(--border); }

  /* Exercise Card */
  .ex {
    background:var(--surface2); border-radius:var(--radius);
    padding:16px 16px 14px; margin-bottom:10px;
    border:0.5px solid var(--border); box-shadow:0 2px 12px rgba(0,0,0,0.04);
  }
  .ex-head { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .ex-type {
    font-size:10px; font-weight:700; padding:2px 10px; border-radius:5px;
    letter-spacing:.3px; text-transform:uppercase;
  }
  .t-choice { background:#e8f2ff; color:var(--blue); }
  .t-multi { background:#fff3e0; color:var(--orange); }
  .t-judge { background:#ffe8e6; color:var(--red); }
  .t-fill { background:#e8f8ed; color:var(--green); }
  .t-code { background:#f0e6ff; color:var(--purple); }

  .ex-q { font-size:14px; font-weight:500; line-height:1.6; margin-bottom:10px; }
  .code-inline {
    font-family:'SF Mono','JetBrains Mono',monospace; font-size:13px;
    background:var(--bg); padding:1px 6px; border-radius:4px; color:var(--text2);
  }

  .opts { display:flex; flex-direction:column; gap:5px; margin-bottom:8px; }
  .opts label {
    display:flex; align-items:center; gap:10px;
    padding:10px 12px; background:var(--bg); border-radius:10px;
    cursor:pointer; font-size:13.5px; font-weight:400;
    transition:all .15s; border:1.5px solid transparent;
    -webkit-tap-highlight-color:transparent;
  }
  .opts label:active { transform:scale(.97); }
  .opts input[type="radio"] {
    appearance:none; -webkit-appearance:none;
    width:18px; height:18px; border:2px solid var(--text3); border-radius:50%;
    flex-shrink:0; transition:all .2s;
  }
  .opts input[type="radio"]:checked { border-color:var(--blue); background:var(--blue); box-shadow:inset 0 0 0 3.5px #fff; }
  .opts label.correct { background:#e8f8ed !important; border-color:var(--green) !important; }
  .opts label.wrong { background:#ffe8e6 !important; border-color:var(--red) !important; }
  .opts label.correct-ans { background:#e8f8ed !important; border-color:var(--green) !important; opacity:.7; }
  .opts input[disabled] { opacity:.5; }

  .ex-input {
    width:100%; padding:10px 14px; border:1.5px solid var(--border);
    border-radius:10px; font-size:14px; font-family:'SF Mono',monospace;
    background:var(--bg); outline:none; transition:all .2s;
    margin-bottom:8px;
  }
  .ex-input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,122,255,.12); }
  .ex.wrong-ans { border-left:4px solid var(--red); }

  .ex-textarea {
    width:100%; padding:10px 14px; border:1.5px solid var(--border);
    border-radius:10px; font-size:13px; font-family:'SF Mono',monospace;
    background:var(--bg); outline:none; transition:all .2s;
    resize:vertical; min-height:70px; margin-bottom:8px; line-height:1.5;
  }
  .ex-textarea:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,122,255,.12); }

  .ex-actions { display:flex; gap:6px; flex-wrap:wrap; }
  .ex-btn {
    display:inline-flex; align-items:center; gap:4px;
    font-size:12px; font-weight:600; padding:6px 14px; border-radius:16px;
    border:none; cursor:pointer; transition:all .2s;
    -webkit-tap-highlight-color:transparent;
  }
  .ex-btn:active { transform:scale(.94); }
  .ex-btn.primary { background:var(--blue); color:#fff; }
  .ex-btn.ghost { background:var(--bg); color:var(--text3); }
  .ex-btn.ghost.showing { background:var(--blue); color:#fff; }
  .ex-btn.green { background:var(--green); color:#fff; opacity:.7; }

  .fb {
    font-size:13px; font-weight:600; padding:7px 12px; border-radius:8px;
    margin-bottom:6px; display:none;
  }
  .fb.show { display:block; animation:fade .2s ease; }
  .fb.correct { background:#e8f8ed; color:#1a5c36; }
  .fb.wrong { background:#ff3b30; color:#fff; font-weight:700; }

  .ans-box {
    display:none; margin-top:8px; padding:12px 14px;
    background:#e8f8ed; border-radius:10px; font-size:13px; line-height:1.5;
  }
  .ans-box.show { display:block; animation:fade .2s ease; }
  .ans-box .al { font-size:10px; font-weight:700; color:var(--green); margin-bottom:3px; text-transform:uppercase; }
  .ans-box .at { color:#1a5c36; font-weight:500; margin-bottom:4px; }
  .ans-box .ae { font-size:12px; color:#3a7d4e; border-top:0.5px solid rgba(52,199,89,.2); padding-top:6px; margin-top:4px; }

  .fu-btn {
    display:inline-flex; align-items:center; gap:4px;
    font-size:11px; font-weight:600; padding:4px 12px; border-radius:12px;
    border:1.5px solid var(--purple); background:transparent; color:var(--purple);
    cursor:pointer; transition:all .2s; margin-top:8px;
  }
  .fu-btn:active { transform:scale(.93); }
  .fu-btn.showing { background:var(--purple); color:#fff; }

  .fu-box {
    display:none; margin-top:8px; padding:12px 14px;
    background:#f0e6ff; border-radius:10px; font-size:13px; line-height:1.6;
    border:0.5px solid rgba(175,82,222,.15);
  }
  .fu-box.show { display:block; animation:fade .25s ease; }
  .fu-box .fl { font-size:10px; font-weight:700; color:var(--purple); margin-bottom:4px; text-transform:uppercase; letter-spacing:.5px; }
  .fu-box .fc { color:#4a2d6e; }
  .fu-box .fc code { background:rgba(175,82,222,.12); padding:1px 5px; border-radius:4px; font-family:'SF Mono',monospace; font-size:12px; }

  /* Tab Bar */
  .tab-bar {
    position:fixed; bottom:0; left:0; right:0;
    background:var(--surface); backdrop-filter:blur(40px) saturate(150%);
    -webkit-backdrop-filter:blur(40px) saturate(150%);
    border-top:0.5px solid var(--border);
    padding:6px 16px calc(6px + var(--safe-bottom));
    display:flex; justify-content:space-around; z-index:200;
  }
  .tab-item {
    display:flex; flex-direction:column; align-items:center; gap:1px;
    font-size:10px; font-weight:500; color:var(--text3);
    cursor:pointer; padding:4px 12px; border-radius:8px;
  }
  .tab-item .ic { font-size:20px; line-height:1; }
  .tab-item.active { color:var(--blue); }
  @media(max-width:380px){ .hero h2{font-size:26px;} }
  ::-webkit-scrollbar{width:2px;height:2px}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
</style>
</head>
<body>

<div class="status-bar">
  <h1>🐍 Python</h1>
  <span class="badge" id="totalBadge">0题</span>
</div>

<div class="hero">
  <h2>期末<span>冲刺</span></h2>
  <p>郑州西亚斯学院 · 经济与管理学院</p>
</div>

<div class="dash">
  <div class="dash-card blue"><div class="num" id="dScore">0</div><div class="label">✅ 答对</div></div>
  <div class="dash-card red"><div class="num" id="dWrong">0</div><div class="label">❌ 答错</div></div>
  <div class="dash-card green"><div class="num" id="dRate">0%</div><div class="label">📊 正确率</div></div>
  <div class="dash-card orange"><div class="num" id="dDone">0</div><div class="label">📝 已做</div></div>
</div>

<div class="cd-row">
  <div class="cd-item"><div class="cd-num" id="cdD">-</div><div class="cd-label">天</div></div>
  <div class="cd-item"><div class="cd-num" id="cdH">-</div><div class="cd-label">小时</div></div>
  <div class="cd-item"><div class="cd-num" id="cdM">-</div><div class="cd-label">分钟</div></div>
  <div class="cd-item"><div class="cd-num" id="cdS">-</div><div class="cd-label">秒</div></div>
</div>

<div class="prog-wrap">
  <div class="prog-hdr"><span>📖 复习进度</span><span id="progText">0/8天</span></div>
  <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
</div>

<div class="day-bar">
  <div class="day-scroll" id="dayScroll"></div>
</div>

<div class="content" id="content"></div>

<div class="tab-bar">
  <div class="tab-item active" onclick="document.querySelector('.day-c.active')?.click()"><span class="ic">📖</span><span>复习</span></div>
  <div class="tab-item" onclick="window.scrollTo({top:0,behavior:'smooth'})"><span class="ic">⬆️</span><span>顶部</span></div>
</div>

<script>
const NOW = new Date(), EXAM = new Date(2026,5,22);
// Score tracking
let score = JSON.parse(localStorage.getItem('pyScore')||'{"ok":0,"no":0}');
function saveScore(){ localStorage.setItem('pyScore',JSON.stringify(score)); }
function updateDash(){
  const t=score.ok+score.no;
  document.getElementById('dScore').textContent=score.ok;
  document.getElementById('dWrong').textContent=score.no;
  document.getElementById('dRate').textContent=t?Math.round(score.ok/t*100)+'%':'0%';
  document.getElementById('dDone').textContent=t;
}
updateDash();

const daysData = [
  {d:1,date:'6月14日',ic:'💻',ti:'程序设计基础',cs:['第1章 程序设计基本方法','第2章 Python程序实例解析'],ts:['搭建开发环境','基本语法：缩进/注释/命名','模块导入 import','输入输出 input/print/eval','内置函数 type/len/id'],
    ex:[
      {t:'choice',l:'单选',q:'Python源程序文件的扩展名是？',o:['A. .py','B. .python','C. .pyth','D. .pt'],a:'A. .py',e:'.py是Python源文件的标准扩展名，.pyc是编译后的字节码文件。'},

      {t:'choice',l:'单选',q:'以下合法的Python标识符是？',o:['A. 2name','B. my-name','C. _myName','D. for'],a:'C. _myName',e:'不能以数字开头(A)，不能含连字符(B)，for是保留字(D)。',f:'<b>标识符规则：</b><br>✅ 字母/下划线开头，后跟字母/数字/下划线<br>✅ 大小写敏感<br>❌ 不能以数字开头<br>❌ 不能含连字符-或特殊字符<br>❌ 不能是保留字（for, if, while等）'},
      {t:'choice',l:'单选',q:'<span class="code-inline">eval("3+5*2")</span> 的结果是？',o:['A. "3+5*2"','B. 13','C. 16','D. 报错'],a:'B. 13',e:'eval()将字符串作为表达式执行，先乘后加得3+10=13。',f:'<b>计算过程：</b><br><code>eval("3+5*2")</code> → 3+(5×2) → 3+10 → 13<br><br>⚠️ <code>*</code>优先级高于<code>+</code><br>加括号：<code>eval("(3+5)*2")</code> → 16<br><br>📌 eval将字符串当作Python代码执行，功能强大但不要对用户输入使用！'},
      {t:'choice',l:'单选',q:'<span class="code-inline">print(type(3.14))</span> 的输出是？',o:['A. <class \'int\'>','B. <class \'float\'>','C. <class \'str\'>','D. <class \'number\'>'],a:'B. <class \'float\'>',e:'3.14是浮点数，type()返回其类型。Python无number类型。'},

      {t:'fill',l:'填空',q:'Python语句结束____（需要/不需要）加分号。',a:'不需要',e:'Python不需要分号，换行即语句结束。同一行多语句才用分号。'},

// ===== RENDER =====
let totalQ = 0;
daysData.forEach(d=>totalQ+=d.ex.length);
document.getElementById('totalBadge').textContent=totalQ+'题';

// Countdown
function upCD(){
  const d=EXAM-NOW;
  if(d<=0){['cdD','cdH','cdM','cdS'].forEach(i=>document.getElementById(i).textContent='0');return;}
  document.getElementById('cdD').textContent=Math.floor(d/86400000);
  document.getElementById('cdH').textContent=String(Math.floor((d%86400000)/3600000)).padStart(2,'0');
  document.getElementById('cdM').textContent=String(Math.floor((d%3600000)/60000)).padStart(2,'0');
  document.getElementById('cdS').textContent=String(Math.floor((d%60000)/1000)).padStart(2,'0');
}
upCD();setInterval(upCD,1000);

// Day Picker
const sc=document.getElementById('dayScroll');
let sh='';
daysData.forEach((d,i)=>{
  const a=i===0?'active':'';
  const t=d.date===`6月${NOW.getDate()}日`?'today':'';
  sh+=`<div class="day-c ${a} ${t}" data-i="${i}">${d.ic} 第${d.d}天 <span class="q-count">${d.ex.length}题</span></div>`;
});
sc.innerHTML=sh;

// Content
const ct=document.getElementById('content');
let ch='';
daysData.forEach((d,di)=>{
  const a=di===0?'active':'';
  ch+=`<div class="day-sec ${a}" data-i="${di}">`;
  // Topic tags
  ch+=`<div class="topic-strip">${d.cs.map(c=>`<span class="topic-tag">${c}</span>`).join('')}</div>`;
  // Exercises
  d.ex.forEach((ex,ei)=>{
    const id=`e${di}-${ei}`;
    const tc=`t-${ex.t==='choice'?'choice':ex.t==='multi'?'multi':ex.t==='judge'?'judge':ex.t==='fill'?'fill':'code'}`;
    const isAuto=ex.t==='choice'||ex.t==='judge';
    ch+=`<div class="ex">
      <div class="ex-head"><span class="ex-type ${tc}">${ex.l}</span></div>
      <div class="ex-q">${ex.q}</div>`;
    if(ex.o){
      ch+=`<div class="opts" data-id="${id}" data-ans="${ex.a.replace(/"/g,'&quot;')}">`;
      ex.o.forEach((opt,oi)=>ch+=`<label${isAuto?` onclick="cR('${id}',this)"`:''}><input type="radio" name="${id}" value="${opt}"><span>${opt}</span></label>`);
      ch+=`</div>`;
      if(!isAuto) ch+=`<div class="ex-actions"><button class="ex-btn primary" onclick="sM('${id}')">✓ 提交</button></div>`;
    } else if(ex.t==='fill'){
      ch+=`<input class="ex-input" id="i${id}" placeholder="输入答案..." spellcheck="false">
      <div class="ex-actions"><button class="ex-btn primary" onclick="sF('${id}')">✓ 提交</button></div>`;
    } else if(ex.t==='code'){
      ch+=`<textarea class="ex-textarea" id="c${id}" placeholder="在此编写代码..." spellcheck="false"></textarea>
      <div class="ex-actions"><button class="ex-btn primary" onclick="sC('${id}')">✓ 提交</button></div>`;
    }
    ch+=`<div class="fb" id="fb${id}"></div>
      <div class="ans-box" id="${id}"><div class="al">✅ 答案</div><div class="at">${ex.a}</div><div class="ae">💡 ${ex.e}</div>
      <button class="fu-btn" onclick="fu('${id}')">🤔 追问详解</button>
      <div class="fu-box" id="fu${id}"><div class="fl">📖 详细解析</div><div class="fc">${ex.f || genFu(ex)}</div></div>
      </div>
    </div>`;
  });
  ch+=`</div>`;
});
ct.innerHTML=ch;

// Progress
function upP(){
  let done=0;
  daysData.forEach(d=>{const m=parseInt(d.date.match(/(\d+)月/)[1])-1,dd=parseInt(d.date.match(/(\d+)日/)[1]);if(new Date(2026,m,dd)<NOW)done++;});
  const p=Math.round(done/daysData.length*100);
  document.getElementById('progFill').style.width=p+'%';
  document.getElementById('progText').textContent=`${done}/${daysData.length}天 (${p}%)`;
}
upP();

// Events
document.querySelectorAll('.day-c').forEach(c=>{
  c.addEventListener('click',function(){
    const i=parseInt(this.dataset.i);
    document.querySelectorAll('.day-c').forEach(x=>x.classList.remove('active'));
    this.classList.add('active');
    document.querySelectorAll('.day-sec').forEach(x=>x.classList.remove('active'));
    document.querySelector(`.day-sec[data-i="${i}"]`).classList.add('active');
    window.scrollTo({top:0,behavior:'smooth'});
  });
});

// Auto today
const ts=`6月${NOW.getDate()}日`;
const ti=daysData.findIndex(d=>d.date===ts);
if(ti>0) document.querySelectorAll('.day-c')[ti]?.click();

// ===== CHECKING =====
function cR(id,label){
  const div=label.closest('.opts');
  const ans=div.dataset.ans;
  const sel=label.querySelector('span').textContent.trim();
  const fb=document.getElementById('fb'+id);
  const ok=sel===ans;
  div.querySelectorAll('input').forEach(r=>r.disabled=true);
  div.querySelectorAll('label').forEach(l=>{
    if(l.querySelector('span').textContent.trim()===ans) l.classList.add('correct-ans');
  });
  if(ok){
    label.classList.add('correct');
    label.closest('.ex')?.classList.remove('wrong-ans');
    fb.textContent='✅ 回答正确！';fb.className='fb show correct';score.ok++;
  } else {
    label.classList.add('wrong');
    label.closest('.ex')?.classList.add('wrong-ans');
    fb.textContent='❌ 回答错误';fb.className='fb show wrong';score.no++;
  }
  saveScore();updateDash();
  const ab=document.getElementById(id);
  if(ab){ab.classList.add('show');
    const btn=ab.previousElementSibling?.querySelector?.('.ex-btn');
  }
}
function sM(id){
  const div=document.querySelector(`.opts[data-id="${id}"]`);
  const ans=div.dataset.ans;
  const fb=document.getElementById('fb'+id);
  const checked=div.querySelectorAll('input:checked');
  if(!checked.length){fb.textContent='⚠️ 请先选择选项';fb.className='fb show wrong';return;}
  const vals=[];checked.forEach(r=>vals.push(r.value.trim()));
  div.querySelectorAll('input').forEach(r=>r.disabled=true);
  const parts=ans.split(',').map(s=>s.trim());
  div.querySelectorAll('label').forEach(l=>{
    if(parts.includes(l.querySelector('span').textContent.trim())) l.classList.add('correct-ans');
  });
  const user=vals.join(', ');
  if(user===ans){
    fb.textContent='✅ 回答正确！';fb.className='fb show correct';score.ok++;
    div.closest('.ex')?.classList.remove('wrong-ans');
  } else {
    fb.textContent='❌ 回答错误，正确答案：'+ans;fb.className='fb show wrong';score.no++;
    div.closest('.ex')?.classList.add('wrong-ans');
  }
  saveScore();updateDash();
  const ab=document.getElementById(id);
  if(ab)ab.classList.add('show');
}
function sF(id){
  const inp=document.getElementById('i'+id);
  const ab=document.getElementById(id);
  const at=ab?.querySelector('.at')?.textContent?.trim()||'';
  const fb=document.getElementById('fb'+id);
  const u=inp.value.trim();
  if(!u){fb.textContent='⚠️ 请输入答案再提交';fb.className='fb show wrong';return;}
  if(u===at){
    fb.textContent='✅ 回答正确！';fb.className='fb show correct';
    inp.style.borderColor='var(--green)';score.ok++;
    inp.closest('.ex')?.classList.remove('wrong-ans');
  } else {
    fb.textContent='❌ 回答错误！正确答案：「'+at+'」\n你的答案：「'+u+'」';
    fb.className='fb show wrong';
    inp.style.borderColor='var(--red)';inp.style.borderWidth='2.5px';
    inp.closest('.ex')?.classList.add('wrong-ans');
    score.no++;
  }
  inp.disabled=true; saveScore();updateDash();
  if(ab)ab.classList.add('show');
}
function sC(id){
  const ta=document.getElementById('c'+id);
  const ab=document.getElementById(id);
  const at=ab?.querySelector('.at')?.textContent?.trim()||'';
  const fb=document.getElementById('fb'+id);
  if(!ta.value.trim()){fb.textContent='⚠️ 请编写代码再提交';fb.className='fb show wrong';return;}
  fb.className='fb show wrong';
  fb.style.background='#ff9500';
  fb.style.color='#fff';
  fb.textContent='📤 已提交！请对照下方参考答案，检查你的代码是否正确';
  ta.disabled=true;
  if(ab)ab.classList.add('show');
}
function fu(id){
  const box=document.getElementById('fu'+id);
  if(!box) return;
  box.classList.toggle('show');
  const btn=box.previousElementSibling;
  if(box.classList.contains('show')){btn.textContent='🙈 收起详解';btn.classList.add('showing');}
  else{btn.textContent='🤔 追问详解';btn.classList.remove('showing');}
}
// Auto-generate follow-up for exercises without pre-written f field
function genFu(ex){
  const t=ex.t, q=ex.q.replace(/<[^>]*>/g,''), a=ex.a, e=ex.e.replace(/<[^>]*>/g,'');
  if(t==='choice'||t==='judge'){
    return '📌 <b>考点：</b>'+e+'<br><br>💡 <b>解题思路：</b>理解概念本质，不要死记硬背。<br><br>⚠️ <b>易错点：</b>这类题容易混淆相似概念，注意区分。<br><br>📝 <b>建议：</b>如果还不理解，建议翻看教材对应章节。';
  } else if(t==='multi'){
    const parts=a.split(',').length;
    return '📌 <b>多选题要点：</b>必须全部选对才得分。<br><br>✅ <b>本题正确答案：</b>'+a+'（共'+parts+'个选项）<br><br>💡 <b>方法：</b>先排除明显错误的，再确认每个正确选项。<br><br>📖 参考教材相关章节加深理解。';
  } else if(t==='fill'){
    return '📌 <b>填空技巧：</b>注意大小写和拼写！<br><br>✅ <b>答案：</b>「'+a+'」<br><br>💡 <b>举一反三：</b>把这个关键词和相关概念一起记忆。<br><br>📝 考试中填空常考基本函数名和关键字。';
  } else {
    return '📌 <b>编程题要点：</b><br>① 先理解题目要求<br>② 确定使用的语法（循环/分支/函数等）<br>③ 注意缩进和变量命名<br><br>💡 参考答案只是其中一种写法，功能正确即可。<br><br>📝 建议动手在IDLE中运行验证。';
  }
}
</script>
